services:
  wiki-api:
    build:
      # 注意：context 是相对于 docker-compose.yml 文件的位置
      # 请确保从 docker/ 目录运行 docker-compose 命令，或者使用：
      # docker-compose -f docker/docker-compose.yml build
      context: .
      dockerfile: Dockerfile
    image: wiki-api-service:latest
    container_name: wiki-api-container
    ports:
      - "8000:8000"
    # 加载环境变量文件 (参考 .env.example 创建 .env)
    env_file:
      - .env
    restart: always
    volumes:
      # 持久化卷（与 Fly.io 一致）：宿主机仓库根目录下的 data/ 挂载到容器 /data
      # 在仓库根执行: mkdir -p data/vector_stores data/repos
      # 若曾使用 docker/data 或 docker/vector_stores，请迁移到仓库根 data/
      - ../data:/data

