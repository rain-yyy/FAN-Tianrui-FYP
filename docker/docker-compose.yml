services:
  wiki-api:
    build:
      # 注意：context 是相对于 docker-compose.yml 文件的位置
      # 请确保从 docker/ 目录运行 docker-compose 命令，或者使用：
      # docker-compose -f docker/docker-compose.yml build
      context: .
      dockerfile: Dockerfile
    image: wiki-api-service:latest
    container_name: wiki-api-container
    ports:
      - "8000:8000"
    # 加载环境变量文件
    env_file:
      - .env
    # 也可以在这里定义默认值或非敏感变量
    environment:
      - PYTHONPATH=/app
      - HOST=0.0.0.0
      - PORT=8000
      - VECTOR_STORE_PATH=/data/vector_stores
      - REPO_STORE_PATH=/data/repos
    restart: always
    volumes:
      # 持久化卷（与 Fly.io 一致）：/data 下包含 vector_stores 与 repos
      # 首次运行请执行: mkdir -p data/vector_stores data/repos
      # 若曾使用旧版 ./vector_stores，请迁移: cp -r vector_stores/* data/vector_stores/
      - ./data:/data

